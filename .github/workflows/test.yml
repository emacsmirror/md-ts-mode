name: Tests
on: [push, pull_request]
jobs:
  test:
    name: Emacs ${{ matrix.emacs }} / tree-sitter ${{ matrix.tree-sitter-runtime }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.tree-sitter-runtime == '0.26' }}
    strategy:
      fail-fast: false
      matrix:
        emacs: ['29.4', '30.2', 'snapshot']
        tree-sitter-runtime: ['default', '0.26']
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs }}
      - name: Show linked tree-sitter dependency
        run: |
          emacs --version | head -1
          readelf -d "$(command -v emacs)" | grep tree-sitter || true
          ldd "$(command -v emacs)" | grep tree-sitter || true
      - name: Override tree-sitter runtime to 0.26
        if: matrix.tree-sitter-runtime == '0.26'
        run: |
          lib_dir=$(./scripts/setup-tree-sitter-runtime.sh 0.26.0)
          echo "LD_LIBRARY_PATH=$lib_dir${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
      - name: Show effective tree-sitter runtime
        run: |
          emacs --version | head -1
          readelf -d "$(command -v emacs)" | grep tree-sitter || true
          ldd "$(command -v emacs)" | grep tree-sitter || true
      - name: Install tree-sitter grammars
        run: |
          emacs --batch -Q --eval '(progn
            (setq treesit-language-source-alist
              (quote ((markdown . ("https://github.com/tree-sitter-grammars/tree-sitter-markdown"
                                   "v0.4.1" "tree-sitter-markdown/src"))
                      (markdown-inline . ("https://github.com/tree-sitter-grammars/tree-sitter-markdown"
                                          "v0.4.1" "tree-sitter-markdown-inline/src"))
                      (python . ("https://github.com/tree-sitter/tree-sitter-python"
                                 "v0.23.6")))))
            (dolist (lang (quote (markdown markdown-inline python)))
              (treesit-install-language-grammar lang)
              (unless (treesit-language-available-p lang)
                (error "Failed to install %s grammar" lang)))
            (message "All grammars installed successfully"))'
      - name: Byte-compile
        run: make compile
      - name: Run tests
        run: make test
